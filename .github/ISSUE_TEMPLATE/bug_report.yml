name: Bug report
description: Report a problem with Tayler Log Tailer
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behavior?
      placeholder: |
        1. Open a window on folder '...'
        2. Set pattern '...'
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Windows 11 23H2
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Version or commit of Tayler Log Tailer.
    validations:
      required: true
